name: AKShare 接口测试

on:
  workflow_dispatch:  # 仅手动触发

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install akshare pandas

      - name: 运行测试脚本
        run: python -u test_akshare.py
